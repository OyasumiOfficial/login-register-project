<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Oyasumi's First Portfolio Website">
    <meta name="keywords" content="portfolio, web development, FrontEnd, Front-End, CSS, Oyasumi">
    <meta name="author" content="Oyasumi">
    <link rel="stylesheet" href="PassResetStyle.css">
    <title>Reset Password</title>
</head>

<body class="BodyRegister">

    <main class="RegisterContainer">

        <form>

            <h1>Reset Password</h1>
            <p>Enter your email address to receive a verification code.</p>

            <div class="InputBox">
                <input
                    type="email"
                    name="email"
                    class="InputPadding"
                    placeholder="Email"
                    required>
            </div>

            <button type="submit">
                Request Reset Code
            </button>

            <div class="CodeSection">

                <h2>Verification Code</h2>
                <p>Enter the 6 digit code sent to your email.</p>

                <div class="CodeInput">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                </div>

            </div>

            <button type="submit">Verify Code</button>

            <a href="Login.html" class="RegisterButton">Cancel</a>

        </form>

    </main>

</body>

</html>
