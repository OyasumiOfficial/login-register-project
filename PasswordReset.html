<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Oyasumi's First Portfolio Website">
    <meta name="keywords" content="portfolio, web development, FrontEnd, Front-End, CSS, Oyasumi">
    <meta name="author" content="Oyasumi">
    <link rel="stylesheet" href="PassResetStyle.css">
    <title>Reset Password</title>
</head>

<body class="BodyReset">

    <main class="Container">

        <form>
            <h1>Reset Password</h1>
            <p>Enter your email address to receive a verification code.</p>

            <div class="InputBox">
                <input type="email" name="email" class="InputPadding" placeholder="Email" maxlength="60"required>
            </div>

            <button class="VerifyButton" type="submit"><a href="EnterResetCode.html" class="HrefColor">Request Reset Code</a></button>

            <div class="Cancel">
                <div><a href="Login.html" class="CancelButton">Cancel</a></div>
            </div>

        </form>

    </main>

</body>

</html>
