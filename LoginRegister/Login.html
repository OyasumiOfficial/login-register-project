<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Let put special characters and accentuation without shuffle the site -->
    <meta charset="UTF-8">

    <!-- Automatically adjusts the website scale based on the device size. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Adds a description for the site when the link is shared.-->
    <meta name="description" content="Oyasumi's First Portfolio Website">

    <!-- Was used before to improve page ranking -->
    <meta name="keywords" content="portfolio, web development, FrontEnd, Front-End, CSS, Oyasumi">

    <!-- Adds the author's name to the site, allowing search engines to give preference to their sites as they create more content -->
    <meta name="author" content="Oyasumi">

    <!-- Links the CSS style files to the HTML, where href is the path to the CSS file, which can be an external or local path, in this case local -->
    <link rel="stylesheet" href="LoginRegisterStyle.css">
    <title>Oyasumi's Login Page</title>
</head>

<body>
    <main class="Container">
        <form>
            <!-- Heading tags define the hierarchy of titles on the page.
            h1 is the most important heading and h6 the least important.
            They help search engines understand the structure and content of the page. -->
            <h1>Log-In test</h1>

            <!-- Email input. placeholder shows a hint to the user. required makes the field mandatory.
            Name defines the field identifier sent to the backend data. -->
            <div class="InputBox">
                <input name="user" placeholder="User" type="email" required maxlength="60" class="InputPadding">
            </div>


            <div class="InputBox">
                <input name="password" placeholder="Password" type="password" required maxlength="36" class="InputPadding">
            </div>



            <!-- checkbox create a selection box. "Id" identifies the input. the "for" of the label
     associates it with the checkbox, allowing clicking the text. Each id must be unique in page. -->
            <div class="Options">
                <div>
                    <!-- Groups the checkbox with the clickable text using the checkbox id, allowing CSS styling to be applied. -->
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember my password</label>
                </div>

                <a href="/RecoverPassword/PasswordReset.html" class="HrefColor">Forgot password?</a>
            </div>

            <!-- Login Button, class define the styling for the button in css, type defines as a button -->
            <button class="LoginRegisterButton" type="submit">Log-In</button>

            <!-- Register Button, class define the styling for the button in css, type defines as a button -->
            <div class="Register">
                <div><a href="Register.html" class="HrefColor">Don`t have an account?</a></div>
                <a href="Register.html" class="RegisterButton">Register</a>
            </div>


        </form>

    </main>
</body>

</html>
